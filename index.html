<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شجرة العائلة</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f6f8;
    direction: rtl;
}

#login {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

#tree-container {
    width: 100%;
    height: 100vh;
}

.node rect {
    fill: white;
    stroke: #2e7d32;
    stroke-width: 2px;
    rx: 8;
}

.node text {
    font-size: 14px;
}

.link {
    fill: none;
    stroke: #aaa;
    stroke-width: 2px;
}

button {
    padding: 10px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 5px;
}
</style>
</head>

<body>

<div id="login">
    <div>
        <h2>دخول شجرة العائلة</h2>
        <input type="password" id="password" placeholder="أدخل كلمة المرور">
        <br><br>
        <button onclick="checkPassword()">دخول</button>
    </div>
</div>

<div id="tree-container" style="display:none;"></div>

<script>

function checkPassword() {
    const pass = document.getElementById("password").value;
    if(pass === "1234") {
        document.getElementById("login").style.display = "none";
        document.getElementById("tree-container").style.display = "block";
        drawTree();
    } else {
        alert("كلمة المرور غير صحيحة");
    }
}

function drawTree() {

const data = {
  name: "الجد الأكبر",
  children: [
    {
      name: "الابن الأول",
      children: [
        { name: "الحفيد 1" },
        { name: "الحفيد 2" }
      ]
    },
    {
      name: "الابن الثاني",
      children: [
        { name: "الحفيد 3" },
        { name: "الحفيد 4" }
      ]
    }
  ]
};

const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select("#tree-container")
  .append("svg")
  .attr("width", width)
  .attr("height", height)
  .call(d3.zoom().on("zoom", (event) => {
      g.attr("transform", event.transform)
  }))
  .append("g");

const g = svg;

const treeLayout = d3.tree().size([width - 200, height - 200]);

const root = d3.hierarchy(data);

treeLayout(root);

g.selectAll(".link")
  .data(root.links())
  .enter()
  .append("path")
  .attr("class", "link")
  .attr("d", d3.linkVertical()
      .x(d => d.x)
      .y(d => d.y)
  );

const node = g.selectAll(".node")
  .data(root.descendants())
  .enter()
  .append("g")
  .attr("class", "node")
  .attr("transform", d => `translate(${d.x},${d.y})`);

node.append("rect")
  .attr("width", 120)
  .attr("height", 40)
  .attr("x", -60)
  .attr("y", -20);

node.append("text")
  .attr("text-anchor", "middle")
  .attr("dy", "5")
  .text(d => d.data.name);

}

</script>

</body>
</html>
